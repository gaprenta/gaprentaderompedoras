<!DOCTYPE html>
<html lang="es-MX">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G-A-P | Renta de Rompedoras en Nuevo León</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --negro: #000000;
            --rojo: #ff0000;
            --blanco: #ffffff;
            --gris-claro: #f4f4f4;
            --whatsapp: #25D366;
        }

        body {
            font-family: 'Roboto', sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--blanco);
            color: var(--negro);
        }

        /* --- ENCABEZADO G-A-P --- */
        header {
            background-color: var(--blanco);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px;
            font-weight: 900;
            font-size: 50px;
            letter-spacing: 5px;
            border-bottom: 2px solid #eee;
        }
        .letra { color: var(--negro); }
        .division { color: var(--rojo); margin: 0 10px; }

        /* --- SECCIÓN SOBRE NOSOTROS --- */
        .hero {
            background-color: var(--negro);
            color: var(--blanco);
            text-align: center;
            padding: 60px 20px;
        }
        .hero h1 { font-size: 24px; margin-bottom: 20px; letter-spacing: 1px; }
        .hero p { max-width: 800px; margin: 0 auto; line-height: 1.6; color: #ccc; }

        /* --- CATÁLOGO DE EQUIPOS --- */
        .container { max-width: 1100px; margin: 40px auto; padding: 0 20px; }
        .grid-equipos {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
        }
        .card {
            border: 1px solid #ddd;
            padding: 25px;
            transition: 0.3s;
            position: relative;
            display: flex;
            flex-direction: column;
        }
        .card:hover { box-shadow: 0 10px 20px rgba(0,0,0,0.1); border-color: var(--rojo); }
        .badge { background: var(--negro); color: var(--blanco); padding: 5px 15px; font-weight: bold; align-self: flex-start; }
        .card h3 { margin: 15px 0 10px; font-size: 20px; border-bottom: 2px solid var(--rojo); display: inline-block; }
        .specs { font-size: 0.9em; color: #555; margin-bottom: 15px; }
        .usos { font-size: 0.85em; list-style: none; padding: 0; margin: 0 0 20px 0; }
        .usos li::before { content: "• "; color: var(--rojo); font-weight: bold; }
        
        /* Botón de cada tarjeta */
        .btn-card {
            background: var(--negro);
            color: var(--blanco);
            text-align: center;
            text-decoration: none;
            padding: 12px;
            font-weight: bold;
            margin-top: auto;
        }
        /* Estilo especial para la de 27kg */
        .card-pro { background: var(--negro); color: var(--blanco); border: 2px solid var(--rojo); }
        .card-pro .badge { background: var(--rojo); }
        .card-pro h3 { color: var(--blanco); }
        .card-pro .specs { color: #aaa; }
        .card-pro .btn-card { background: var(--rojo); }

        /* --- HORARIOS Y COBERTURA --- */
        .info-extra { background: var(--gris-claro); padding: 50px 20px; margin-top: 50px; text-align: center; }
        .info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 40px; max-width: 1000px; margin: 0 auto; }
        .info-box h4 { text-transform: uppercase; border-bottom: 2px solid var(--rojo); display: inline-block; padding-bottom: 5px; }
        .info-box p { margin: 10px 0; font-weight: bold; }
        .domingo { color: #999; }

        /* --- BOTÓN WHATSAPP FLOTANTE --- */
        .float-ws {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background-color: var(--whatsapp);
            color: white;
            padding: 15px 25px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            z-index: 1000;
        }

        footer { text-align: center; padding: 30px; font-size: 0.8em; color: #777; }
    </style>
</head>
<body>

    <header>
        <span class="letra">G</span>
        <span class="division">-</span>
        <span class="letra">A</span>
        <span class="division">-</span>
        <span class="letra">P</span>
    </header>
