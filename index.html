<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G-A-P Renta de Equipos</title>
    <style>
        /* 1. ESTILOS DEL ENCABEZADO RESPONSIVO */
        header {
            background-color: #000;
            color: #ffcc00;
            padding: 20px;
            border-bottom: 5px solid #ffcc00;
            display: flex;
            flex-direction: column; /* Móvil: uno sobre otro */
            align-items: center;
            text-align: center;
            font-family: 'Arial Black', sans-serif;
        }

        .logo-container h1 {
            margin: 0;
            font-size: 2rem;
        }

        .header-info {
            margin-top: 10px;
            color: #fff;
            font-size: 1rem;
        }

        @media (min-width: 768px) {
            header {
                flex-direction: row; /* PC: Lado a lado */
                justify-content: space-between;
                padding: 20px 50px;
                text-align: left;
            }
            .header-info {
                margin-top: 0;
            }
        }

        /* 2. ESTILOS DE LAS TARJETAS (CARD) */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            padding: 20px;
            background-color: #f4f4f4;
        }

        .card {
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .card img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            transition: transform 0.4s ease;
        }

        /* 3. EFECTO DE RESALTADO (FOCUS MODE) */
        .foto-resaltada {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            cursor: zoom-out;
        }

        .foto-resaltada img {
            max-width: 90%;
            max-height: 80%;
            border: 5px solid #ffcc00;
            border-radius: 10px;
            transform: scale(1.1);
        }

        /* Bloquear scroll cuando hay zoom */
        .no-scroll {
            overflow: hidden;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <h1>G-A-P</h1>
        </div>
        <div class="header-info">
            <strong>Renta de Rompedoras y Equipo</strong><br>
            📍 Monterrey y Área Metropolitana
        </div>
    </header>

    <div class="grid-container">
        <div class="card" data-nombre="Rompedora Eléctrica">
            <img src="tu-imagen-1.jpg" alt="Equipo" class="img-equipo">
            <div style="padding: 15px;">
                <h3>Rompedora Eléctrica</h3>
                <button class="btn-whatsapp">Rentar Ahora</button>
            </div>
        </div>
        </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            
            // --- FUNCIONALIDAD DE RESALTADO DE FOTOS ---
            const images = document.querySelectorAll('.img-equipo');
            
            images.forEach(img => {
                img.addEventListener('click', (e) => {
                    e.stopPropagation(); // Evita que se disparen otros eventos
                    
                    // Crear el contenedor oscuro (Overlay)
                    const overlay = document.createElement('div');
                    overlay.classList.add('foto-resaltada');
                    
                    // Crear la imagen clonada
                    const fullImg = document.createElement('img');
                    fullImg.src = img.src;
                    
                    overlay.appendChild(fullImg);
                    document.body.appendChild(overlay);
                    document.body.classList.add('no-scroll');

                    // Cerrar al hacer clic en el fondo
                    overlay.onclick = () => {
                        overlay.remove();
                        document.body.classList.remove('no-scroll');
                    };
                });
            });

            // --- LÓGICA DE WHATSAPP ---
            const botones = document.querySelectorAll('.btn-whatsapp');
            botones.forEach(boton => {
                boton.addEventListener('click', (e) => {
                    e.stopPropagation(); // Para que no se abra la foto al dar clic al botón
                    const card = boton.closest('.card');
                    const equipoNombre = card.getAttribute('data-nombre');
                    const telefono = "528119988053";
                    const mensaje = encodeURIComponent(`Hola G-A-P, me interesa rentar el equipo: ${equipoNombre}. ¿Me podrían dar informes?`);
                    window.open(`https://wa.me/${telefono}?text=${mensaje}`, '_blank');
                });
            });

            // --- ANIMACIÓN SCROLL REVEAL ---
            const cards = document.querySelectorAll('.card');
            const observerOptions = { threshold: 0.1 };

            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.style.opacity = "1";
                        entry.target.style.transform = "translateY(0)";
                    }
                });
            }, observerOptions);

            cards.forEach(card => {
                card.style.opacity = "0";
                card.style.transform = "translateY(30px)";
                card.style.transition = "all 0.6s ease-out";
                observer.observe(card);
            });
        });
    </script>

</body>
</html>
