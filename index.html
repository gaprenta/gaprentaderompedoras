<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GAP - Renta de Rompedoras</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --blanco: #ffffff;
            --oscuro: #1a1a1a;
            --whatsapp-color: #25d366;
            --whatsapp-hover-color: #128c7e;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            line-height: 1.6;
            color: var(--oscuro);
            background: var(--blanco);
        }

        /* Contenedor de la Imagen Principal */
        .image-container {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--blanco);
            overflow: hidden;
            position: relative;
        }

        /* La imagen visual del diseño */
        .design-image {
            max-width: 100%; /* La imagen se ajusta al ancho del navegador */
            height: auto;
            display: block;
        }

        /* Botón de WhatsApp Flotante */
        .btn-whatsapp-floating {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background-color: var(--whatsapp-color);
            color: white;
            padding: 15px 25px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
            z-index: 1000;
            transition: background-color 0.3s ease, transform 0.3s ease;
        }

        .btn-whatsapp-floating:hover {
            background-color: var(--whatsapp-hover-color);
            transform: translateY(-5px);
            text-decoration: none;
        }

        /* Optimización para móviles */
        @media (max-width: 600px) {
            .image-container {
                overflow: visible; /* Asegura que la imagen no se recorte */
            }
            .design-image {
                max-width: none;
                width: 100%;
                height: auto;
            }
            .btn-whatsapp-floating {
                font-size: 0.9rem;
                padding: 12px 20px;
            }
        }
    </style>
</head>
<body>

    <div class="image-container">
        <img src="diseno_web_gap.png" alt="Diseño Completo de GAP Renta de Rompedoras" class="design-image">
    </div>

    <a href="https://wa.me/528119988053?text=Hola,%20quisiera%20rentar%20una%20rompedora." class="btn-whatsapp-floating" target="_blank">
        <i class="fab fa-whatsapp fa-2x"></i>
        <span>¡Renta aquí por WhatsApp!</span>
    </a>

</body>
</html>
